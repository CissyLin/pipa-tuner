<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#1a1a2e"/>
  <!-- 扇形半圆轨道 -->
  <path d="M86 400 A 170 170 0 0 1 426 400" fill="none" stroke="#0f3460" stroke-width="12" stroke-linecap="round"/>
  <path d="M86 400 A 170 170 0 0 1 426 400" fill="none" stroke="url(#g)" stroke-width="12" stroke-linecap="round"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffa502" stop-opacity="0.3"/>
      <stop offset="45%" stop-color="#2ed573" stop-opacity="0.5"/>
      <stop offset="55%" stop-color="#2ed573" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff4757" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <!-- 绿色中心点 -->
  <circle cx="256" cy="400" r="6" fill="#2ed573"/>
  <!-- 刻度 -->
  <line x1="130" y1="290" x2="135" y2="299" stroke="#555" stroke-width="3"/>
  <line x1="200" y1="242" x2="203" y2="252" stroke="#555" stroke-width="3"/>
  <line x1="312" y1="242" x2="309" y2="252" stroke="#555" stroke-width="3"/>
  <line x1="382" y1="290" x2="377" y2="299" stroke="#555" stroke-width="3"/>
  <!-- 指针指向中间 -->
  <line x1="256" y1="400" x2="256" y2="260" stroke="#fff" stroke-width="7" stroke-linecap="round"/>
  <circle cx="256" cy="400" r="15" fill="#2ed573"/>
  <circle cx="256" cy="400" r="6" fill="#fff"/>
  <!-- 顶部音符 -->
  <text x="256" y="175" text-anchor="middle" fill="#fff" font-size="110" font-weight="700" font-family="sans-serif">🎵</text>
  <text x="256" y="215" text-anchor="middle" fill="#8ab4f8" font-size="16" font-family="sans-serif" letter-spacing="4">调音器</text>
</svg>
