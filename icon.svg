<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="arcGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffa502" stop-opacity="0.5"/>
      <stop offset="40%" stop-color="#2ed573" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#2ed573" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff4757" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <!-- 背景圆角矩形 -->
  <rect width="512" height="512" rx="100" fill="#1a1a2e"/>

  <!-- 琵琶琴身（简化的梨形剪影） -->
  <path d="
    M 210 105
    C 210 105, 200 72, 184 58
    C 168 44, 148 42, 148 42
    L 148 56
    C 162 58, 174 66, 178 80
    C 182 95, 185 112, 185 130
    C 185 155, 180 180, 172 205
    C 160 245, 138 285, 132 320
    C 126 355, 132 388, 152 410
    C 172 432, 210 445, 256 445
    C 302 445, 340 432, 360 410
    C 380 388, 386 355, 380 320
    C 374 285, 352 245, 340 205
    C 332 180, 327 155, 327 130
    C 327 112, 330 95, 334 80
    C 338 66, 350 58, 364 56
    L 364 42
    C 364 42, 344 44, 328 58
    C 312 72, 302 105, 302 105
  "
  fill="#16213e" stroke="#0f3460" stroke-width="5"/>

  <!-- 琴身内部高光 -->
  <path d="
    M 220 115
    C 220 115, 215 90, 205 72
    L 205 80
    C 212 90, 215 105, 215 120
    C 215 145, 212 165, 205 185
    C 195 215, 180 245, 172 275
    C 164 305, 164 330, 172 350
    C 180 370, 200 385, 256 385
    C 312 385, 332 370, 340 350
    C 348 330, 348 305, 340 275
    C 332 245, 317 215, 307 185
    C 300 165, 297 145, 297 120
    C 297 105, 300 90, 307 80
    L 307 72
    C 297 90, 292 115, 292 115
  "
  fill="#1a2844" opacity="0.6"/>

  <!-- 琴头（顶部弯曲装饰） -->
  <path d="
    M 160 56
    C 140 42, 132 30, 156 20
    C 165 16, 180 16, 190 20
    C 210 28, 214 38, 220 42
  "
  fill="none" stroke="#2ed573" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  <path d="
    M 352 56
    C 372 42, 380 30, 356 20
    C 347 16, 332 16, 322 20
    C 302 28, 298 38, 292 42
  "
  fill="none" stroke="#2ed573" stroke-width="5" stroke-linecap="round" opacity="0.6"/>

  <!-- 四个弦轴 -->
  <circle cx="150" cy="30" r="8" fill="#8ab4f8" opacity="0.7"/>
  <circle cx="175" cy="22" r="7" fill="#8ab4f8" opacity="0.8"/>
  <circle cx="337" cy="22" r="7" fill="#8ab4f8" opacity="0.8"/>
  <circle cx="362" cy="30" r="8" fill="#8ab4f8" opacity="0.7"/>

  <!-- 琴身内的调音器弧形轨道 -->
  <path d="M 160 340 A 100 100 0 0 1 352 340"
        fill="none" stroke="#0f3460" stroke-width="8" stroke-linecap="round"/>
  <path d="M 160 340 A 100 100 0 0 1 352 340"
        fill="none" stroke="url(#arcGrad)" stroke-width="8" stroke-linecap="round"/>

  <!-- 刻度 -->
  <line x1="195" y1="280" x2="199" y2="288" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="240" y1="255" x2="242" y2="264" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="256" y1="248" x2="256" y2="258" stroke="#2ed573" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="272" y1="255" x2="270" y2="264" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="317" y1="280" x2="313" y2="288" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>

  <!-- 指针朝向中心（调准状态） -->
  <line x1="256" y1="340" x2="256" y2="262" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
  <circle cx="256" cy="340" r="12" fill="#2ed573"/>
  <circle cx="256" cy="340" r="5" fill="#fff"/>

  <!-- 琴颈上的品丝（简约代表） -->
  <line x1="245" y1="120" x2="267" y2="120" stroke="#555" stroke-width="2" opacity="0.5"/>
  <line x1="248" y1="140" x2="264" y2="140" stroke="#555" stroke-width="1.5" opacity="0.5"/>
  <line x1="250" y1="155" x2="262" y2="155" stroke="#555" stroke-width="1.5" opacity="0.5"/>
</svg>
