<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>琵琶调音器</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  :root {
    --bg: #1a1a2e;
    --card: #16213e;
    --cir: #0f3460;
    --accent: #2ed573;
    --actxt: #8ab4f8;
    --txt: #eee;
    --stxt: #888;
    --bstxt: #555;
    --bdr: #333;
    --low: #ffa502;
    --high: #ff4757;
    --glow: rgba(46,213,115,0.35);
    --gaugebg: #555;
  }
  .skin-sunset {
    --bg: #1e1418;
    --card: #2e1a20;
    --cir: #4a2a30;
    --accent: #ff9f43;
    --actxt: #fdcb6e;
    --txt: #f0ddd0;
    --stxt: #b09080;
    --bstxt: #706050;
    --bdr: #5a3a38;
    --low: #e8a030;
    --high: #e06050;
    --glow: rgba(255,159,67,0.3);
    --gaugebg: #5a3a38;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, "PingFang SC", "Noto Sans SC", sans-serif;
    background: var(--bg);
    color: var(--txt);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px;
    user-select: none;
    -webkit-user-select: none;
    transition: background 0.4s;
  }
  .container {
    max-width: 420px;
    width: 100%;
    background: var(--card);
    border-radius: 24px;
    padding: 20px 16px 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    transition: background 0.4s;
  }
  h1 { text-align:center; font-size:22px; font-weight:600; margin-bottom:1px; letter-spacing:2px; }
  .subtitle { text-align:center; color:var(--stxt); font-size:12px; margin-bottom:10px; transition:color 0.4s; }

  /* 配色切换 */
  .skin-row {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .skin-dot {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 4px 12px 4px 4px;
    border-radius: 20px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 12px;
    color: var(--stxt);
    -webkit-tap-highlight-color: transparent;
  }
  .skin-dot.active { border-color: var(--accent); color: var(--txt); }
  .skin-dot .dot {
    width: 20px; height: 20px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .note-display {
    position:relative; width:160px; height:160px; margin:0 auto 10px;
    border-radius:50%; background:var(--cir);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
    transition: background 0.4s, box-shadow 0.15s;
  }
  .note-display.in-tune { box-shadow: inset 0 0 30px rgba(0,0,0,0.5), 0 0 28px var(--glow); }
  .note-name { font-size:64px; font-weight:700; line-height:1; letter-spacing:2px; }
  .note-octave { font-size:18px; font-weight:300; color:var(--actxt); margin-top:2px; transition:color 0.4s; }
  .note-freq { font-size:12px; color:var(--stxt); margin-top:2px; font-family:"SF Mono","Cascadia Code",monospace; transition:color 0.4s; }

  .gauge-wrap { position:relative; width:290px; height:150px; margin:0 auto 2px; }
  .gauge-svg { width:100%; height:100%; display:block; }
  .gauge-center { position:absolute; top:37%; left:50%; transform:translate(-50%,-50%); text-align:center; pointer-events:none; z-index:2; }
  .gauge-cents { font-size:26px; font-weight:700; font-family:"SF Mono","Cascadia Code",monospace; line-height:1; transition:color 0.12s; }
  .gauge-cents.good { color:var(--accent); text-shadow: 0 0 10px var(--glow); }
  .gauge-cents.low { color:var(--low); }
  .gauge-cents.high { color:var(--high); }
  .gauge-hint { font-size:11px; color:var(--stxt); margin-top:1px; transition:color 0.4s; }

  .strings { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin:4px 0 12px; }
  .string-btn {
    background:var(--cir); border:2px solid transparent; border-radius:12px;
    padding:10px 6px; text-align:center; cursor:pointer; transition:all 0.15s;
    color:var(--stxt); font-size:13px; -webkit-tap-highlight-color:transparent;
  }
  .string-btn.active { border-color:var(--accent); color:var(--txt); background:var(--cir); }
  .string-btn .sname { font-size:16px; font-weight:600; display:block; margin-bottom:1px; }
  .string-btn .spitch { font-size:11px; color:var(--stxt); font-family:monospace; transition:color 0.4s; }
  .string-btn.active .spitch { color:var(--actxt); }

  .ref-row { display:flex; gap:6px; margin-bottom:8px; }
  .ref-btn {
    flex:1; background:var(--cir); border:none; border-radius:10px;
    padding:10px; color:var(--stxt); font-size:13px; cursor:pointer;
    transition:all 0.15s; -webkit-tap-highlight-color:transparent; text-align:center;
  }
  .ref-btn.active { color:var(--txt); background:var(--cir); border:1px solid var(--accent); }

  .status-bar { display:flex; justify-content:center; align-items:center; gap:10px; }
  .mic-btn {
    background:transparent; border:2px solid var(--bstxt); border-radius:50%;
    width:50px; height:50px; display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:all 0.2s; -webkit-tap-highlight-color:transparent;
  }
  .mic-btn.active { border-color:var(--accent); background:rgba(46,213,115,0.06); }
  .mic-btn svg { width:22px; height:22px; fill:var(--stxt); transition:fill 0.2s; }
  .mic-btn.active svg { fill:var(--accent); }
  .status-text { font-size:12px; color:var(--stxt); transition:color 0.4s; }
  .status-text.listening { color:var(--accent); }
  .status-text.error { color:var(--high); }

  .note-history { margin-top:6px; display:flex; justify-content:center; gap:3px; flex-wrap:wrap; min-height:16px; }
  .note-history span { font-size:10px; color:var(--bstxt); padding:2px 4px; background:var(--bg); border-radius:4px; transition:background 0.4s,color 0.4s; }
  .footer { margin-top:12px; text-align:center; font-size:10px; color:var(--bstxt); letter-spacing:1px; transition:color 0.4s; }

  @media (max-width:380px) {
    .gauge-wrap { width:250px; height:130px; }
    .note-display { width:140px; height:140px; }
    .note-name { font-size:52px; }
    .gauge-cents { font-size:22px; }
    .container { padding:14px 12px 18px; }
  }
</style>
</head>
<body>
<div class="container" id="container">
  <h1>🎵 琵琶调音器</h1>
  <div class="subtitle">Pipa Tuner · A=440Hz</div>

  <!-- 配色 -->
  <div class="skin-row" id="skinRow">
    <div class="skin-dot active" data-skin="">
      <span class="dot" style="background:linear-gradient(135deg,#16213e,#0f3460)"></span>深蓝
    </div>
    <div class="skin-dot" data-skin="sunset">
      <span class="dot" style="background:linear-gradient(135deg,#2e1a20,#4a2a30)"></span>日出
    </div>
  </div>

  <!-- 音名 -->
  <div class="note-display" id="noteDisplay">
    <div class="note-name" id="noteName">—</div>
    <div class="note-octave" id="noteOctave"></div>
    <div class="note-freq" id="noteFreq">— Hz</div>
  </div>

  <!-- 扇形表 -->
  <div class="gauge-wrap">
    <svg class="gauge-svg" viewBox="0 0 290 150">
      <defs>
        <linearGradient id="gg" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="var(--low)" stop-opacity="0.35"/>
          <stop offset="30%" stop-color="var(--low)" stop-opacity="0.15"/>
          <stop offset="42%" stop-color="var(--accent)" stop-opacity="0.12"/>
          <stop offset="58%" stop-color="var(--accent)" stop-opacity="0.12"/>
          <stop offset="70%" stop-color="var(--high)" stop-opacity="0.15"/>
          <stop offset="100%" stop-color="var(--high)" stop-opacity="0.35"/>
        </linearGradient>
      </defs>
      <path d="M25 130 A 120 120 0 0 1 265 130" stroke="var(--gaugebg)" stroke-width="5" stroke-linecap="round" fill="none"/>
      <path d="M25 130 A 120 120 0 0 1 265 130" stroke="url(#gg)" stroke-width="5" stroke-linecap="round" fill="none"/>
      <line x1="44" y1="80" x2="47" y2="86" stroke="var(--bstxt)" stroke-width="1.2"/>
      <text x="44" y="73" text-anchor="middle" fill="var(--bstxt)" font-size="7">-50</text>
      <line x1="85" y1="52" x2="88" y2="58" stroke="var(--bstxt)" stroke-width="1.2"/>
      <text x="85" y="45" text-anchor="middle" fill="var(--bstxt)" font-size="7">-25</text>
      <line x1="145" y1="38" x2="145" y2="46" stroke="var(--accent)" stroke-width="2"/>
      <text x="145" y="31" text-anchor="middle" fill="var(--accent)" font-size="8" opacity="0.8">0</text>
      <line x1="205" y1="52" x2="202" y2="58" stroke="var(--bstxt)" stroke-width="1.2"/>
      <text x="205" y="45" text-anchor="middle" fill="var(--bstxt)" font-size="7">+25</text>
      <line x1="246" y1="80" x2="243" y2="86" stroke="var(--bstxt)" stroke-width="1.2"/>
      <text x="246" y="73" text-anchor="middle" fill="var(--bstxt)" font-size="7">+50</text>
      <g id="needle" transform="rotate(0,145,130)">
        <line x1="145" y1="130" x2="145" y2="42" stroke="rgba(255,255,255,0.08)" stroke-width="5" stroke-linecap="round"/>
        <line x1="145" y1="130" x2="145" y2="42" stroke="var(--accent)" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="145" cy="42" r="2.5" fill="var(--accent)"/>
        <circle cx="145" cy="130" r="4" fill="var(--accent)" opacity="0.2"/>
        <circle cx="145" cy="130" r="2" fill="var(--accent)"/>
      </g>
    </svg>
    <div class="gauge-center">
      <div class="gauge-cents" id="centsDisplay">—</div>
      <div class="gauge-hint" id="gaugeHint">弹拨琴弦</div>
    </div>
  </div>

  <!-- 琴弦 -->
  <div class="strings" id="stringsContainer">
    <div class="string-btn" data-freq="220.00" data-name="老弦 A3"><span class="sname">🔴 老弦</span><span class="spitch">A3 · 220.00 Hz</span></div>
    <div class="string-btn active" data-freq="293.66" data-name="缠弦 D4"><span class="sname">🟡 缠弦</span><span class="spitch">D4 · 293.66 Hz</span></div>
    <div class="string-btn" data-freq="329.63" data-name="中弦 E4"><span class="sname">🟢 中弦</span><span class="spitch">E4 · 329.63 Hz</span></div>
    <div class="string-btn" data-freq="440.00" data-name="子弦 A4"><span class="sname">🔵 子弦</span><span class="spitch">A4 · 440.00 Hz</span></div>
  </div>

  <!-- 参考音（单个切换） -->
  <div class="ref-row">
    <button class="ref-btn" id="refBtn">🔊 播放参考音</button>
  </div>

  <!-- 状态 -->
  <div class="status-bar">
    <button class="mic-btn" id="micBtn">
      <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 1 0-6 0v6a3 3 0 0 0 3 3z"/><path d="M17 11a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.93V21h2v-3.07A7 7 0 0 0 19 11h-2z"/></svg>
    </button>
    <span class="status-text" id="statusText">点击麦克风开始</span>
  </div>

  <div class="note-history" id="noteHistory"></div>
  <div class="footer">🥚 蛋蛋Cissy联合出品</div>
</div>

<script>
const NOTES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
function f2n(f){if(f<=0)return null;const s=12*Math.log2(f/440),n=Math.round(s),o=4+Math.floor((n+120)/12)-10,i=((n%12)+12)%12,ef=440*Math.pow(2,n/12);return{name:NOTES[i],octave:o,freq:f,targetFreq:ef,cents:Math.round(1200*Math.log2(f/ef)),idx:i};}
function autoCorr(b,sr){let l=b.length,s=0;for(let i=0;i<l;i++)s+=Math.abs(b[i]);if(s<l*0.001)return-1;let c=new Float32Array(l);for(let g=0;g<l;g++){let s2=0;for(let i=0;i<l-g;i++)s2+=b[i]*b[i+g];c[g]=s2;}let m=1;for(let i=0;i<l;i++)if(c[i]>m)m=c[i];for(let i=0;i<l;i++)c[i]/=m;let mi=0,mv=-Infinity;for(let i=40;i<l;i++){if(c[i]>mv){mv=c[i];mi=i;}}if(mv<0.2||mi<40)return-1;if(mi>0&&mi<l-1){let a=c[mi-1],b=c[mi],c2=c[mi+1],sh=(a-c2)/(2*(a-2*b+c2));if(!isNaN(sh))mi+=sh;}let f=sr/mi;return(f<60||f>1200)?-1:f;}
class Tuner{
  constructor(){
    this.ac=null;this.st=null;this.an=null;this.src=null;this.ls=false;this.rf=null;
    this.osc=null;this.gn=null;this.pl=false;this.tf=293.66;this.tn='缠弦 D4';
    this.nn=document.getElementById('noteName');this.no=document.getElementById('noteOctave');
    this.nf=document.getElementById('noteFreq');this.nd=document.getElementById('noteDisplay');
    this.stt=document.getElementById('statusText');this.mb=document.getElementById('micBtn');
    this.sb=document.querySelectorAll('.string-btn');this.rb=document.getElementById('refBtn');
    this.nh=document.getElementById('noteHistory');this.cd=document.getElementById('centsDisplay');
    this.gh=document.getElementById('gaugeHint');this.ndl=document.getElementById('needle');
    this.ct=document.getElementById('container');this.sk=document.querySelectorAll('.skin-dot');
    this.notes=[];
    this.mb.addEventListener('click',()=>{this.ls?this.stop():this.start();});
    this.sb.forEach(b=>{b.addEventListener('click',()=>{this.sb.forEach(x=>x.classList.remove('active'));b.classList.add('active');this.tf=parseFloat(b.dataset.freq);this.tn=b.dataset.name;this.updN(null);})});
    this.rb.addEventListener('click',()=>{this.pl?this.sRef():this.pRef()});
    this.sk.forEach(s=>{s.addEventListener('click',()=>{this.sk.forEach(x=>x.classList.remove('active'));s.classList.add('active');const skin=s.dataset.skin;this.ct.className='container'+(skin?' skin-'+skin:'');})});
  }
  async start(){try{
    this.ac=new(window.AudioContext||window.webkitAudioContext)();
    this.st=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
    this.src=this.ac.createMediaStreamSource(this.st);this.an=this.ac.createAnalyser();this.an.fftSize=2048;
    this.src.connect(this.an);this.ls=true;this.mb.classList.add('active');
    this.stt.textContent='🎙 监听中…';this.stt.className='status-text listening';this.gh.textContent='弹拨琴弦';
    this.loop();
  }catch(e){this.stt.textContent='❌ 麦克风不可用: '+e.message;this.stt.className='status-text error';console.error(e);}}
  stop(){this.ls=false;if(this.rf){cancelAnimationFrame(this.rf);this.rf=null;}if(this.st){this.st.getTracks().forEach(t=>t.stop());this.st=null;}if(this.ac){this.ac.close();this.ac=null;}this.mb.classList.remove('active');this.stt.textContent='点击麦克风开始';this.stt.className='status-text';this.gh.textContent='弹拨琴弦';this.nn.textContent='—';this.no.textContent='';this.nf.textContent='— Hz';this.nd.classList.remove('in-tune');this.cd.textContent='—';this.cd.className='gauge-cents';this.ndl.setAttribute('transform','rotate(0,145,130)');this.sRef();}
  loop(){if(!this.ls)return;const b=new Float32Array(this.an.fftSize);this.an.getFloatTimeDomainData(b);const f=autoCorr(b,this.ac.sampleRate);if(f>0){const n=f2n(f);this.updD(n);this.updN(n);}else{this.nn.textContent='…';this.no.textContent='';this.nf.textContent='— Hz';this.nd.classList.remove('in-tune');}this.rf=requestAnimationFrame(()=>this.loop());}
  updD(n){if(!n)return;this.nn.textContent=n.name;this.no.textContent='Octave '+n.octave;this.nf.textContent=n.freq.toFixed(1)+' Hz';this.notes.unshift(n.name+n.octave);if(this.notes.length>12)this.notes.pop();this.nh.innerHTML=this.notes.map(x=>`<span>${x}</span>`).join('');}
  updN(n){if(!n)return;const c=1200*Math.log2(n.freq/this.tf),cl=Math.max(-50,Math.min(50,c));this.ndl.setAttribute('transform',`rotate(${cl},145,130)`);const a=Math.abs(c);let cls;if(a<3){cls='good';this.nd.classList.add('in-tune');this.stt.textContent=`✅ ${this.tn} 调准`;this.stt.className='status-text listening';}else if(c<0){cls='low';this.nd.classList.remove('in-tune');this.stt.textContent=`🔽 偏低 ${Math.round(a)}¢`;this.stt.className='status-text listening';}else{cls='high';this.nd.classList.remove('in-tune');this.stt.textContent=`🔼 偏高 ${Math.round(a)}¢`;this.stt.className='status-text listening';}this.cd.textContent=`${c>0?'+':''}${Math.round(c)}¢`;this.cd.className='gauge-cents '+cls;}
  pRef(){if(!this.ac||this.ac.state==='closed')this.ac=new(window.AudioContext||window.webkitAudioContext)();if(this.pl)return;this.osc=this.ac.createOscillator();this.gn=this.ac.createGain();this.osc.type='sine';this.osc.frequency.value=this.tf;this.gn.gain.value=0.3;this.osc.connect(this.gn);this.gn.connect(this.ac.destination);this.osc.start();this.pl=true;this.rb.classList.add('active');this.rb.textContent='⏹ 停止参考音';}
  sRef(){if(this.osc){try{this.osc.stop()}catch(e){}this.osc=null;}if(this.gn){this.gn.disconnect();this.gn=null;}this.pl=false;this.rb.classList.remove('active');this.rb.textContent='🔊 播放参考音';}
}
document.addEventListener('DOMContentLoaded',()=>{new Tuner();});
</script>
</body>
</html>
